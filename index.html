<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Sudoku</title>
    <script src="sudoku.js" type="text/javascript"></script>
    <style type="text/css">

        .jssudoku button {
            margin: 4px;
        }

        .jssudoku table td {
            margin: 0px;
            padding: 0px;
        }

        .jssudoku table td.topleft {
            border-top: 5px solid black;
            border-left: 5px solid black;
            border-right: 1px solid gray;
            border-bottom: 1px solid gray;
        }

        .jssudoku table td.topcenter {
            border-top: 5px solid black;
            border-left: 1px solid gray;
            border-right: 1px solid gray;
            border-bottom: 1px solid gray;
        }

        .jssudoku table td.topright {
            border-top: 5px solid black;
            border-left: 1px solid gray;
            border-right: 5px solid black;
            border-bottom: 1px solid gray;
        }

        .jssudoku table td.middleleft {
            border-top: 1px solid gray;
            border-left: 5px solid black;
            border-right: 1px solid gray;
            border-bottom: 1px solid gray;
        }

        .jssudoku table td.middlecenter {
            border-top: 1px solid gray;
            border-left: 1px solid gray;
            border-right: 1px solid gray;
            border-bottom: 1px solid gray;
        }

        .jssudoku table td.middleright {
            border-top: 1px solid gray;
            border-left: 1px solid gray;
            border-right: 5px solid black;
            border-bottom: 1px solid gray;
        }

        .jssudoku table td.bottomleft {
            border-top: 1px solid gray;
            border-left: 5px solid black;
            border-right: 1px solid gray;
            border-bottom: 5px solid black;
        }

        .jssudoku table td.bottomcenter {
            border-top: 1px solid gray;
            border-left: 1px solid gray;
            border-right: 1px solid gray;
            border-bottom: 5px solid black;
        }

        .jssudoku table td.bottomright {
            border-top: 1px solid gray;
            border-left: 1px solid gray;
            border-right: 5px solid black;
            border-bottom: 5px solid black;
        }

        .jssudoku .empty {
            background-color: lightgray;
        }

    </style>
  </head>
  <body>
    <header>
      <h1>Sudoku</h1>
    </header>
    <main>
      <div id="sudoku1"></div>
      <script type="text/javascript">
        var sudoku1 = new Sudoku("sudoku1");
      </script>
    </main>
    <footer>
        <p>Chris Petersen 2026</p>
    </footer>
  </body>
</html>
